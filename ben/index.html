  <style>
    /* Tokens lifted from the main site (index.html · dark ink theme). */
    :root {
      --bg: #04070d;
      --accent: #f2d8ba;
      --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
      --mono: 'Martian Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --ink: #e9eef4;
      --ink-soft: #c4cedb;
      --muted: #7e8b9d;
      --line: #18202e;
      --halo: 0 0 14px rgba(2, 8, 14, 0.95), 0 1px 30px rgba(2, 8, 14, 0.6);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }

    body {
      font-family: var(--mono);
      color: var(--ink);
      background-color: var(--bg);
      /* one level deeper: a faint warm light from the surface, fading into the deep */
      background-image:
        radial-gradient(120% 80% at 50% -10%, rgba(242, 216, 186, 0.07), transparent 60%),
        radial-gradient(100% 70% at 50% 120%, rgba(2, 9, 16, 0.9), transparent 70%);
      background-attachment: fixed;
      min-height: 100svh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: var(--ink); text-decoration: none; }

    .wrap {
      max-width: 440px;
      margin: 0 auto;
      min-height: 100svh;
      padding: clamp(40px, 9vh, 84px) 24px 28px;
      display: flex;
      flex-direction: column;
    }

    .rise { animation: rise 800ms cubic-bezier(0.2, 0.7, 0.2, 1) both; animation-delay: var(--d, 0s); }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; } }

    /* Brand lockup — the octl mark + wordmark, linking home */
    .brand {
      display: inline-flex; align-items: center; gap: 11px;
      align-self: flex-start;
    }
    .brand .mark { width: 30px; height: 30px; border-radius: 8px; display: block; }
    .brand .word {
      font-family: var(--serif); font-optical-sizing: auto; font-weight: 380;
      font-size: 23px; letter-spacing: -0.01em; color: var(--ink);
      text-shadow: var(--halo);
    }
    .brand:hover .word { color: var(--accent); }
    .brand:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 3px; }

    .head { margin-top: clamp(40px, 11vh, 96px); }

    .name {
      font-family: var(--serif); font-optical-sizing: auto; font-weight: 400;
      font-size: clamp(2.7rem, 12vw, 3.6rem); line-height: 0.96; letter-spacing: -0.015em;
      margin: 0; color: var(--ink); text-shadow: var(--halo);
    }
    .title {
      font-size: 10px; font-weight: 400; letter-spacing: 0.34em; text-indent: 0.34em;
      text-transform: uppercase; color: var(--muted); margin: 20px 0 0;
    }
    .descriptor {
      font-family: var(--serif); font-optical-sizing: auto; font-style: italic; font-weight: 360;
      font-size: 1.05rem; line-height: 1.4; color: var(--ink-soft);
      margin: 26px 0 0;
    }
    .descriptor a { color: var(--ink-soft); border-bottom: 1px solid var(--line); padding-bottom: 1px; }
    .descriptor a:hover { color: var(--accent); border-bottom-color: var(--accent); }

    /* Action buttons — large tap targets, single column */
    .actions { margin-top: clamp(34px, 7vh, 56px); display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: flex; align-items: center; gap: 13px;
      min-height: 54px; padding: 0 20px;
      border: 1px solid var(--line); border-radius: 13px;
      font-family: var(--mono); font-size: 13px; font-weight: 400; letter-spacing: 0.04em;
      color: var(--ink);
      transition: border-color 220ms ease, color 220ms ease, background-color 220ms ease, transform 120ms ease;
    }
    .btn .ic { width: 19px; height: 19px; flex: none; opacity: 0.85; }
    .btn .lbl { flex: 1; }
    .btn .arr { color: var(--muted); font-size: 15px; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:hover .arr { color: var(--accent); }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    .btn.primary {
      background: var(--accent); color: #04070d; border-color: var(--accent);
      font-weight: 400; letter-spacing: 0.05em;
    }
    .btn.primary .ic { opacity: 1; }
    .btn.primary .arr { color: rgba(4, 7, 13, 0.5); }
    .btn.primary:hover { background: #f7e6d2; color: #04070d; }
    .btn.primary:hover .arr { color: rgba(4, 7, 13, 0.6); }

    footer {
      margin-top: auto; padding-top: 48px;
      font-size: 9px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
